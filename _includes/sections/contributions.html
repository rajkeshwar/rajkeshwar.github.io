<section id="contributions" aria-labelledby="contrib-h">
  <div class="section-header">
    <span class="section-num">03.</span>
    <h2 class="section-title" id="contrib-h">Open Source</h2>
    <div class="section-line" aria-hidden="true"></div>
  </div>

  <div class="contributions-table-wrap fade-in">
    <table class="contributions-table" aria-label="Open source contributions">
      <thead>
        <tr>
          <th scope="col">Project</th>
          <th scope="col">Contributions</th>
        </tr>
      </thead>
      <tbody>
        {% for item in site.data.contributions %}
        <tr>
          <td>
            <a class="contrib-project-name"
               href="{{ item.url }}"
               target="_blank"
               rel="noopener noreferrer">{{ item.project }}</a>
            <span class="contrib-project-desc">{{ item.desc }}</span>
          </td>
          <td>
            <div class="contrib-links">
              {% for pr in item.prs %}
              <a class="contrib-link"
                 href="{{ pr.url }}"
                 target="_blank"
                 rel="noopener noreferrer">
                {% if pr.type == "pr" %}
                <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                  <path d="M1.5 3.25a2.25 2.25 0 1 1 3 2.122v5.256a2.251 2.251 0 1 1-1.5 0V5.372A2.25 2.25 0 0 1 1.5 3.25Zm5.677-.177L9.573.677A.25.25 0 0 1 10 .854V2.5h1A2.5 2.5 0 0 1 13.5 5v5.628a2.251 2.251 0 1 1-1.5 0V5a1 1 0 0 0-1-1h-1v1.646a.25.25 0 0 1-.427.177L7.177 3.427a.25.25 0 0 1 0-.354Z"/>
                </svg>
                {% else %}
                <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                  <path d="M8 9.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z"/>
                  <path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0Z"/>
                </svg>
                {% endif %}
                {{ pr.label }}
              </a>
              {% endfor %}
            </div>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</section>
