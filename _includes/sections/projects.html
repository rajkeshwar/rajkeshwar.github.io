<section id="projects" aria-labelledby="proj-h">
  <div class="section-header">
    <span class="section-num">03.</span>
    <h2 class="section-title" id="proj-h">Key Projects</h2>
    <div class="section-line" aria-hidden="true"></div>
  </div>

  <div class="projects-grid" role="list">
    {% for project in site.data.projects %}
    <article class="project-card fade-in" role="listitem">
      <div class="project-top">
        <div class="project-folder" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="36" height="36"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </div>
        <span class="project-num">{{ project.num }}</span>
      </div>
      <h3 class="project-name">{{ project.name }}</h3>
      <p class="project-desc">{{ project.desc }}</p>
      <div class="project-tech">
        {% for t in project.tech %}
        <span class="tech-pill">{{ t }}</span>
        {% endfor %}
      </div>
    </article>
    {% endfor %}
  </div>
</section>
